<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Work Check-in Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .user-info {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .user-info p {
            margin: 5px 0;
            font-size: 14px;
        }
        
        .label {
            font-weight: bold;
            color: #666;
        }
        
        .value {
            color: #333;
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 10px;
        }
        
        .stat-card {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-card .number {
            font-size: 28px;
            font-weight: bold;
        }
        
        .stat-card .label {
            font-size: 12px;
            opacity: 0.9;
            color: white;
        }
        
        .month-selector {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
        }
        
        .month-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .month-btn:active {
            transform: scale(0.95);
        }
        
        .current-month {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        
        .table-container {
            overflow-x: auto;
            margin-bottom: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        
        th {
            background: #f8f9fa;
            font-weight: bold;
            color: #555;
            position: sticky;
            top: 0;
        }
        
        .ontime {
            color: #28a745;
            font-weight: bold;
        }
        
        .late-small {
            color: #ffc107;
            font-weight: bold;
        }
        
        .late-big {
            color: #dc3545;
            font-weight: bold;
        }
        
        .far {
            color: #6c757d;
        }
        
        .checkin-btn, .history-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            margin-bottom: 10px;
            transition: transform 0.2s;
        }
        
        .history-btn {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }
        
        .checkin-btn:active, .history-btn:active {
            transform: scale(0.98);
        }
        
        .checkin-btn.loading, .history-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
        
        .no-data {
            text-align: center;
            padding: 30px;
            color: #999;
        }
        
        .close-btn {
            margin-top: 10px;
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            font-size: 14px;
        }
        
        .section {
            display: none;
        }
        
        .section.active {
            display: block;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }
            th, td {
                padding: 8px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Секция отметки -->
        <div id="checkinSection" class="section active">
            <div class="header">
                <h1>📍 Отметка на работе</h1>
                <p>Отметьте своё прибытие</p>
            </div>
            
            <div class="user-info">
                <p><span class="label">👤 Имя:</span> <span class="value" id="userName">Загрузка...</span></p>
                <p><span class="label">🆔 ID:</span> <span class="value" id="userId">Загрузка...</span></p>
                <p><span class="label">📅 Дата:</span> <span class="value" id="currentDate">Загрузка...</span></p>
                <p><span class="label">⏰ Время:</span> <span class="value" id="currentTime">Загрузка...</span></p>
            </div>
            
            <button class="checkin-btn" id="checkinBtn">📍 Отметиться</button>
            <button class="history-btn" id="historyBtn">📋 Мои отметки</button>
            
            <div id="status" class="status"></div>
            <div id="locationInfo" class="status info" style="display: none;"></div>
            
            <button class="close-btn" id="closeBtn">Закрыть</button>
        </div>
        
        <!-- Секция истории -->
        <div id="historySection" class="section">
            <div class="header">
                <h1>📋 Мои отметки</h1>
                <p>История посещений</p>
            </div>
            
            <div class="stats" id="statsContainer"></div>
            
            <div class="month-selector">
                <button class="month-btn" id="prevMonth">◀</button>
                <span class="current-month" id="currentMonth">Загрузка...</span>
                <button class="month-btn" id="nextMonth">▶</button>
            </div>
            
            <div class="table-container" id="tableContainer">
                <div class="no-data">Загрузка данных...</div>
            </div>
            
            <button class="checkin-btn" id="backBtn">📍 Назад к отметке</button>
            <button class="close-btn" id="closeHistoryBtn">Закрыть</button>
        </div>
    </div>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // ========== КОНФИГУРАЦИЯ ==========
        const BOT_TOKEN = '7197499100:AAHmbsP6c4ZPA85s0uYVUHbfZ2nrIHKPG8k';
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyYUXV-a5BR-Ma_mFTz7855k8AITi420dysWRwJmAYDPUgfKsrAA-AA3ByMIpiNYuJo1Q/exec';
        
        // Координаты работы
        const WORK_LAT = 43.29878;
        const WORK_LNG = 45.84382;
        const ALLOWED_DISTANCE = 300;
        
        // Рабочее время
        const WORK_START_HOUR = 9;
        const WORK_START_MINUTE = 0;
        
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Данные пользователя
        let userData = {
            id: tg.initDataUnsafe.user?.id || null,
            username: tg.initDataUnsafe.user?.username || "Нет username",
            firstName: tg.initDataUnsafe.user?.first_name || "Пользователь",
            lastName: tg.initDataUnsafe.user?.last_name || ""
        };
        
        let currentDate = new Date();
        let currentMonth = currentDate.getMonth();
        let currentYear = currentDate.getFullYear();
        
        if (!userData.id) {
            document.getElementById('userName').textContent = "Ошибка авторизации";
            document.getElementById('userId').textContent = "Не удалось получить данные";
            document.getElementById('checkinBtn').disabled = true;
            document.getElementById('historyBtn').disabled = true;
        } else {
            document.getElementById('userName').textContent = `${userData.firstName} ${userData.lastName}`;
            document.getElementById('userId').textContent = userData.id;
        }
        
        // Обновление времени
        function updateDateTime() {
            const now = new Date();
            document.getElementById('currentDate').textContent = now.toLocaleDateString('ru-RU');
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('ru-RU');
        }
        
        updateDateTime();
        setInterval(updateDateTime, 1000);
        
        // Запрос геолокации
        function requestLocation() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject(new Error('Геолокация не поддерживается'));
                    return;
                }
                
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        resolve({
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude,
                            accuracy: position.coords.accuracy
                        });
                    },
                    (error) => {
                        let errorMessage = '';
                        switch(error.code) {
                            case error.PERMISSION_DENIED:
                                errorMessage = 'Доступ к геолокации запрещён';
                                break;
                            case error.POSITION_UNAVAILABLE:
                                errorMessage = 'Местоположение недоступно';
                                break;
                            case error.TIMEOUT:
                                errorMessage = 'Время ожидания истекло';
                                break;
                            default:
                                errorMessage = 'Ошибка определения местоположения';
                        }
                        reject(new Error(errorMessage));
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            });
        }
        
        // Отправка в Google Sheets
        async function sendToSheets(data) {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return await response.json();
        }
        
        // Получение истории
        async function getHistory(user_id, year, month) {
            const response = await fetch(`${SCRIPT_URL}?action=getHistory&user_id=${user_id}&year=${year}&month=${month+1}`, {
                method: 'GET'
            });
            return await response.json();
        }
        
        // Отправка в Telegram
        async function sendToBot(location, result) {
            try {
                const text = `✅ <b>Новая отметка!</b>\n\n` +
                    `👤 ${userData.firstName} ${userData.lastName}\n` +
                    `🆔 ID: ${userData.id}\n` +
                    `📍 ${location.latitude}, ${location.longitude}\n` +
                    `📊 Точность: ${Math.round(location.accuracy)} м\n` +
                    `📋 ${result.message}`;
                
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: userData.id,
                        text: text,
                        parse_mode: 'HTML'
                    })
                });
            } catch (error) {
                console.error('Ошибка отправки в бот:', error);
            }
        }
        
        // Расчёт расстояния
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const φ1 = lat1 * Math.PI / 180;
            const φ2 = lat2 * Math.PI / 180;
            const Δφ = (lat2 - lat1) * Math.PI / 180;
            const Δλ = (lon2 - lon1) * Math.PI / 180;
            
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            
            return R * c;
        }
        
        // Основная функция отметки
        async function checkIn() {
            const btn = document.getElementById('checkinBtn');
            const statusDiv = document.getElementById('status');
            
            btn.classList.add('loading');
            btn.disabled = true;
            
            statusDiv.className = 'status info';
            statusDiv.textContent = '📍 Определяем местоположение...';
            
            try {
                const location = await requestLocation();
                const distance = calculateDistance(location.latitude, location.longitude, WORK_LAT, WORK_LNG);
                
                statusDiv.textContent = `📡 Расстояние: ${Math.round(distance)} м`;
                
                let result;
                
                if (distance > ALLOWED_DISTANCE) {
                    result = {
                        status: "far",
                        message: `❌ Вы далеко от работы (${Math.round(distance)} м)`,
                        delay: 0
                    };
                    statusDiv.className = 'status error';
                    statusDiv.textContent = result.message;
                } else {
                    // Московское время
                    const now = new Date();
                    const mskOffset = 3 * 60;
                    const localOffset = now.getTimezoneOffset();
                    const mskTime = new Date(now.getTime() + (mskOffset + localOffset) * 60 * 1000);
                    
                    const hours = mskTime.getHours();
                    const minutes = mskTime.getMinutes();
                    const currentMinutes = hours * 60 + minutes;
                    const workStartMinutes = WORK_START_HOUR * 60 + WORK_START_MINUTE;
                    const delayMinutes = currentMinutes - workStartMinutes;
                    const timeStr = `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}`;
                    
                    if (delayMinutes <= 0) {
                        result = {
                            status: "ontime",
                            message: `✅ Вовремя! (${timeStr})`,
                            delay: 0
                        };
                    } else if (delayMinutes <= 30) {
                        result = {
                            status: "late_small",
                            message: `⚠️ Опоздание на ${delayMinutes} мин (${timeStr})`,
                            delay: delayMinutes
                        };
                    } else {
                        result = {
                            status: "late_big",
                            message: `🔴 Опоздание на ${delayMinutes} мин (${timeStr})`,
                            delay: delayMinutes
                        };
                    }
                    
                    statusDiv.className = 'status success';
                    statusDiv.textContent = result.message;
                    
                    const sheetData = {
                        user_id: userData.id,
                        username: userData.username,
                        name: `${userData.firstName} ${userData.lastName}`,
                        latitude: location.latitude,
                        longitude: location.longitude,
                        accuracy: location.accuracy,
                        status: result.status,
                        delay: result.delay
                    };
                    
                    await sendToSheets(sheetData);
                    await sendToBot(location, result);
                }
                
                const locationInfo = document.getElementById('locationInfo');
                locationInfo.innerHTML = `
                    <strong>📍 Местоположение:</strong><br>
                    Широта: ${location.latitude}<br>
                    Долгота: ${location.longitude}<br>
                    Точность: ${Math.round(location.accuracy)} м<br>
                    Расстояние: ${Math.round(distance)} м
                `;
                locationInfo.style.display = 'block';
                
                setTimeout(() => tg.close(), 3000);
                
            } catch (error) {
                console.error('Ошибка:', error);
                statusDiv.className = 'status error';
                statusDiv.textContent = `❌ ${error.message}`;
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }
        
        // Загрузка истории
        async function loadHistory() {
            const tableContainer = document.getElementById('tableContainer');
            const statsContainer = document.getElementById('statsContainer');
            
            tableContainer.innerHTML = '<div class="no-data">Загрузка данных...</div>';
            
            try {
                const data = await getHistory(userData.id, currentYear, currentMonth);
                
                if (data.status === 'success' && data.records && data.records.length > 0) {
                    // Статистика
                    const stats = data.stats;
                    statsContainer.innerHTML = `
                        <div class="stat-card">
                            <div class="number">${stats.total}</div>
                            <div class="label">Всего дней</div>
                        </div>
                        <div class="stat-card">
                            <div class="number">${stats.ontime}</div>
                            <div class="label">Вовремя</div>
                        </div>
                        <div class="stat-card">
                            <div class="number">${stats.late}</div>
                            <div class="label">Опоздания</div>
                        </div>
                    `;
                    
                    // Таблица
                    let tableHtml = `
                        <table>
                            <thead>
                                <tr><th>📅 Дата</th><th>⏰ Опоздание</th></tr>
                            </thead>
                            <tbody>
                    `;
                    
                    data.records.forEach(record => {
                        let statusClass = '';
                        let delayText = '';
                        
                        if (record.status === 'Вовремя') {
                            statusClass = 'ontime';
                            delayText = '✅ 0 мин';
                        } else if (record.status.includes('Опоздание')) {
                            if (record.delay <= 30) {
                                statusClass = 'late-small';
                            } else {
                                statusClass = 'late-big';
                            }
                            delayText = `⚠️ ${record.delay} мин`;
                        } else {
                            statusClass = 'far';
                            delayText = '❌ Не на месте';
                        }
                        
                        tableHtml += `
                            <tr>
                                <td>${record.date}</td>
                                <td class="${statusClass}">${delayText}</td>
                            </tr>
                        `;
                    });
                    
                    tableHtml += `</tbody></table>`;
                    tableContainer.innerHTML = tableHtml;
                } else {
                    tableContainer.innerHTML = '<div class="no-data">📭 Нет отметок за этот месяц</div>';
                    statsContainer.innerHTML = '';
                }
            } catch (error) {
                console.error('Ошибка:', error);
                tableContainer.innerHTML = '<div class="no-data">❌ Ошибка загрузки данных</div>';
            }
        }
        
        // Переключение секций
        function showCheckinSection() {
            document.getElementById('checkinSection').classList.add('active');
            document.getElementById('historySection').classList.remove('active');
        }
        
        function showHistorySection() {
            document.getElementById('checkinSection').classList.remove('active');
            document.getElementById('historySection').classList.add('active');
            
            const monthNames = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 
                               'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
            document.getElementById('currentMonth').textContent = `${monthNames[currentMonth]} ${currentYear}`;
            
            loadHistory();
        }
        
        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            } else if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            
            const monthNames = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 
                               'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
            document.getElementById('currentMonth').textContent = `${monthNames[currentMonth]} ${currentYear}`;
            
            loadHistory();
        }
        
        // Обработчики событий
        document.getElementById('checkinBtn').onclick = checkIn;
        document.getElementById('historyBtn').onclick = showHistorySection;
        document.getElementById('backBtn').onclick = showCheckinSection;
        document.getElementById('closeBtn').onclick = () => tg.close();
        document.getElementById('closeHistoryBtn').onclick = () => tg.close();
        document.getElementById('prevMonth').onclick = () => changeMonth(-1);
        document.getElementById('nextMonth').onclick = () => changeMonth(1);
        
        console.log('Mini App готов к работе');
    </script>
</body>
</html>
