<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Work Check-in Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .user-info {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .user-info p {
            margin: 5px 0;
            font-size: 14px;
        }
        
        .label {
            font-weight: bold;
            color: #666;
        }
        
        .value {
            color: #333;
        }
        
        .checkin-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .checkin-btn:active {
            transform: scale(0.98);
        }
        
        .checkin-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
        
        .location-info {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            font-size: 12px;
            color: #666;
            display: none;
        }
        
        .close-btn {
            margin-top: 20px;
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            font-size: 14px;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📍 Отметка на работе</h1>
            <p>Отметьте своё прибытие</p>
        </div>
        
        <div class="user-info">
            <p><span class="label">👤 Имя:</span> <span class="value" id="userName">Загрузка...</span></p>
            <p><span class="label">🆔 ID:</span> <span class="value" id="userId">Загрузка...</span></p>
            <p><span class="label">📅 Дата:</span> <span class="value" id="currentDate">Загрузка...</span></p>
            <p><span class="label">⏰ Время:</span> <span class="value" id="currentTime">Загрузка...</span></p>
        </div>
        
        <button class="checkin-btn" id="checkinBtn">📍 Отметиться</button>
        
        <div id="status" class="status"></div>
        <div id="locationInfo" class="location-info"></div>
        
        <button class="close-btn" id="closeBtn">Закрыть</button>
    </div>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // ========== КОНФИГУРАЦИЯ ==========
        const BOT_TOKEN = '7197499100:AAHmbsP6c4ZPA85s0uYVUHbfZ2nrIHKPG8k';
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyYUXV-a5BR-Ma_mFTz7855k8AITi420dysWRwJmAYDPUgfKsrAA-AA3ByMIpiNYuJo1Q/exec';
        
        // Координаты работы
        const WORK_LAT = 43.29878;
        const WORK_LNG = 45.84382;
        const ALLOWED_DISTANCE = 300;
        
        // Рабочее время
        const WORK_START_HOUR = 9;
        const WORK_START_MINUTE = 0;
        
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Данные пользователя
        let userData = {
            id: tg.initDataUnsafe.user?.id || null,
            username: tg.initDataUnsafe.user?.username || "Нет username",
            firstName: tg.initDataUnsafe.user?.first_name || "Пользователь",
            lastName: tg.initDataUnsafe.user?.last_name || ""
        };
        
        if (!userData.id) {
            document.getElementById('userName').textContent = "Ошибка авторизации";
            document.getElementById('userId').textContent = "Не удалось получить данные";
            document.getElementById('checkinBtn').disabled = true;
        } else {
            document.getElementById('userName').textContent = `${userData.firstName} ${userData.lastName}`;
            document.getElementById('userId').textContent = userData.id;
        }
        
        // Обновление времени
        function updateDateTime() {
            const now = new Date();
            document.getElementById('currentDate').textContent = now.toLocaleDateString('ru-RU');
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('ru-RU');
        }
        
        updateDateTime();
        setInterval(updateDateTime, 1000);
        
        // Запрос геолокации
        function requestLocation() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject(new Error('Геолокация не поддерживается'));
                    return;
                }
                
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        resolve({
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude,
                            accuracy: position.coords.accuracy
                        });
                    },
                    (error) => {
                        let errorMessage = '';
                        switch(error.code) {
                            case error.PERMISSION_DENIED:
                                errorMessage = 'Доступ к геолокации запрещён';
                                break;
                            case error.POSITION_UNAVAILABLE:
                                errorMessage = 'Местоположение недоступно';
                                break;
                            case error.TIMEOUT:
                                errorMessage = 'Время ожидания истекло';
                                break;
                            default:
                                errorMessage = 'Ошибка определения местоположения';
                        }
                        reject(new Error(errorMessage));
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            });
        }
        
        // Отправка в Google Sheets через JSONP (обход CORS)
        function sendToSheets(data) {
            return new Promise((resolve, reject) => {
                // Используем callback параметр для JSONP
                const callbackName = 'callback_' + Date.now();
                const script = document.createElement('script');
                
                window[callbackName] = function(response) {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    resolve(response);
                };
                
                const params = new URLSearchParams();
                params.append('callback', callbackName);
                params.append('data', JSON.stringify(data));
                
                script.src = `${SCRIPT_URL}?${params.toString()}`;
                script.onerror = () => {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    reject(new Error('Ошибка соединения'));
                };
                
                document.body.appendChild(script);
            });
        }
        
        // Отправка в Telegram
        async function sendToBot(location, result) {
            try {
                const text = `✅ <b>Новая отметка!</b>\n\n` +
                    `👤 ${userData.firstName} ${userData.lastName}\n` +
                    `🆔 ID: ${userData.id}\n` +
                    `📍 ${location.latitude}, ${location.longitude}\n` +
                    `📊 Точность: ${Math.round(location.accuracy)} м\n` +
                    `📋 ${result.message}`;
                
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: userData.id,
                        text: text,
                        parse_mode: 'HTML'
                    })
                });
            } catch (error) {
                console.error('Ошибка отправки в бот:', error);
            }
        }
        
        // Расчёт расстояния
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const φ1 = lat1 * Math.PI / 180;
            const φ2 = lat2 * Math.PI / 180;
            const Δφ = (lat2 - lat1) * Math.PI / 180;
            const Δλ = (lon2 - lon1) * Math.PI / 180;
            
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            
            return R * c;
        }
        
        // Основная функция
        async function checkIn() {
            const btn = document.getElementById('checkinBtn');
            const statusDiv = document.getElementById('status');
            
            btn.classList.add('loading');
            btn.disabled = true;
            
            statusDiv.className = 'status info';
            statusDiv.textContent = '📍 Определяем местоположение...';
            
            try {
                const location = await requestLocation();
                const distance = calculateDistance(location.latitude, location.longitude, WORK_LAT, WORK_LNG);
                
                statusDiv.textContent = `📡 Расстояние: ${Math.round(distance)} м`;
                
                let result;
                
                if (distance > ALLOWED_DISTANCE) {
                    result = {
                        status: "far",
                        message: `❌ Вы далеко от работы (${Math.round(distance)} м)`,
                        delay: 0
                    };
                    statusDiv.className = 'status error';
                    statusDiv.textContent = result.message;
                } else {
                    // Московское время
                    const now = new Date();
                    const mskOffset = 3 * 60;
                    const localOffset = now.getTimezoneOffset();
                    const mskTime = new Date(now.getTime() + (mskOffset + localOffset) * 60 * 1000);
                    
                    const hours = mskTime.getHours();
                    const minutes = mskTime.getMinutes();
                    const currentMinutes = hours * 60 + minutes;
                    const workStartMinutes = WORK_START_HOUR * 60 + WORK_START_MINUTE;
                    const delayMinutes = currentMinutes - workStartMinutes;
                    const timeStr = `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}`;
                    
                    if (delayMinutes <= 0) {
                        result = {
                            status: "ontime",
                            message: `✅ Вовремя! (${timeStr})`,
                            delay: 0
                        };
                    } else if (delayMinutes <= 30) {
                        result = {
                            status: "late_small",
                            message: `⚠️ Опоздание на ${delayMinutes} мин (${timeStr})`,
                            delay: delayMinutes
                        };
                    } else {
                        result = {
                            status: "late_big",
                            message: `🔴 Опоздание на ${delayMinutes} мин (${timeStr})`,
                            delay: delayMinutes
                        };
                    }
                    
                    statusDiv.className = 'status success';
                    statusDiv.textContent = result.message;
                    
                    // Отправляем данные
                    const sheetData = {
                        user_id: userData.id,
                        username: userData.username,
                        name: `${userData.firstName} ${userData.lastName}`,
                        latitude: location.latitude,
                        longitude: location.longitude,
                        accuracy: location.accuracy,
                        status: result.status,
                        delay: result.delay
                    };
                    
                    await sendToSheets(sheetData);
                    await sendToBot(location, result);
                }
                
                const locationInfo = document.getElementById('locationInfo');
                locationInfo.innerHTML = `
                    <strong>📍 Местоположение:</strong><br>
                    Широта: ${location.latitude}<br>
                    Долгота: ${location.longitude}<br>
                    Точность: ${Math.round(location.accuracy)} м<br>
                    Расстояние: ${Math.round(distance)} м
                `;
                locationInfo.style.display = 'block';
                
                setTimeout(() => tg.close(), 3000);
                
            } catch (error) {
                console.error('Ошибка:', error);
                statusDiv.className = 'status error';
                statusDiv.textContent = `❌ ${error.message}`;
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }
        
        document.getElementById('checkinBtn').onclick = checkIn;
        document.getElementById('closeBtn').onclick = () => tg.close();
    </script>
</body>
</html>
