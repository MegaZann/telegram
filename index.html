<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Work Check-in Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .user-info {
            background: #f5f5f5;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .user-info p {
            margin: 5px 0;
            font-size: 14px;
        }
        
        .label {
            font-weight: bold;
            color: #666;
        }
        
        .value {
            color: #333;
        }
        
        .checkin-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .checkin-btn:active {
            transform: scale(0.98);
        }
        
        .checkin-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
        
        .location-info {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            font-size: 12px;
            color: #666;
            display: none;
        }
        
        .close-btn {
            margin-top: 20px;
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            font-size: 14px;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📍 Отметка на работе</h1>
            <p>Отметьте своё прибытие</p>
        </div>
        
        <div class="user-info">
            <p><span class="label">👤 Имя:</span> <span class="value" id="userName">Загрузка...</span></p>
            <p><span class="label">🆔 ID:</span> <span class="value" id="userId">Загрузка...</span></p>
            <p><span class="label">📅 Дата:</span> <span class="value" id="currentDate">Загрузка...</span></p>
            <p><span class="label">⏰ Время:</span> <span class="value" id="currentTime">Загрузка...</span></p>
        </div>
        
        <button class="checkin-btn" id="checkinBtn">📍 Отметиться</button>
        
        <div id="status" class="status"></div>
        <div id="locationInfo" class="location-info"></div>
        
        <button class="close-btn" id="closeBtn">Закрыть</button>
    </div>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Конфигурация
        const BOT_TOKEN = '7197499100:AAHmbsP6c4ZPA85s0uYVUHbfZ2nrIHKPG8k'; // Замените на новый токен!
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyYUXV-a5BR-Ma_mFTz7855k8AITi420dysWRwJmAYDPUgfKsrAA-AA3ByMIpiNYuJo1Q/exec'; // URL вашего Apps Script
        
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Растянуть на весь экран
        
        // Данные пользователя
        let userData = {
            id: tg.initDataUnsafe.user?.id || 123456789,
            username: tg.initDataUnsafe.user?.username || "Нет username",
            firstName: tg.initDataUnsafe.user?.first_name || "Пользователь",
            lastName: tg.initDataUnsafe.user?.last_name || ""
        };
        
        // Отображаем информацию о пользователе
        document.getElementById('userName').textContent = `${userData.firstName} ${userData.lastName}`;
        document.getElementById('userId').textContent = userData.id;
        
        // Обновляем время
        function updateDateTime() {
            const now = new Date();
            document.getElementById('currentDate').textContent = now.toLocaleDateString('ru-RU');
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('ru-RU');
        }
        
        updateDateTime();
        setInterval(updateDateTime, 1000);
        
        // Функция запроса геолокации
        function requestLocation() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject(new Error('Геолокация не поддерживается вашим браузером'));
                    return;
                }
                
                const options = {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                };
                
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        resolve({
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude,
                            accuracy: position.coords.accuracy,
                            timestamp: position.timestamp
                        });
                    },
                    (error) => {
                        let errorMessage = '';
                        switch(error.code) {
                            case error.PERMISSION_DENIED:
                                errorMessage = 'Доступ к геолокации запрещён';
                                break;
                            case error.POSITION_UNAVAILABLE:
                                errorMessage = 'Информация о местоположении недоступна';
                                break;
                            case error.TIMEOUT:
                                errorMessage = 'Время ожидания истекло';
                                break;
                            default:
                                errorMessage = 'Ошибка определения местоположения';
                        }
                        reject(new Error(errorMessage));
                    },
                    options
                );
            });
        }
        
        // Отправка данных в бот
        async function sendToBot(location) {
            const text = `✅ Новая отметка!\n\n👤 Пользователь: ${userData.firstName} ${userData.lastName}\n🆔 ID: ${userData.id}\n📍 Координаты: ${location.latitude}, ${location.longitude}\n📊 Точность: ${Math.round(location.accuracy)} м\n⏰ Время: ${new Date().toLocaleString('ru-RU')}`;
            
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    chat_id: userData.id,
                    text: text,
                    parse_mode: 'HTML'
                })
            });
            
            return await response.json();
        }
        
        // Отправка в Google Sheets через Apps Script
        async function sendToSheets(location, result) {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    user_id: userData.id,
                    username: userData.username,
                    name: `${userData.firstName} ${userData.lastName}`,
                    latitude: location.latitude,
                    longitude: location.longitude,
                    accuracy: location.accuracy,
                    status: result.status,
                    message: result.message
                })
            });
            
            return await response.json();
        }
        
        // Проверка расстояния до работы
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const φ1 = lat1 * Math.PI / 180;
            const φ2 = lat2 * Math.PI / 180;
            const Δφ = (lat2 - lat1) * Math.PI / 180;
            const Δλ = (lon2 - lon1) * Math.PI / 180;
            
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            
            return R * c;
        }
        
        // Основная функция отметки
        async function checkIn() {
            const btn = document.getElementById('checkinBtn');
            const statusDiv = document.getElementById('status');
            
            btn.classList.add('loading');
            btn.disabled = true;
            
            statusDiv.className = 'status info';
            statusDiv.textContent = '📍 Определяем ваше местоположение...';
            
            try {
                // Получаем геолокацию
                const location = await requestLocation();
                
                // Координаты работы (Москва)
                const WORK_LAT = 55.751244;
                const WORK_LNG = 37.618423;
                const ALLOWED_DISTANCE = 500; // метров
                
                // Вычисляем расстояние
                const distance = calculateDistance(location.latitude, location.longitude, WORK_LAT, WORK_LNG);
                
                statusDiv.textContent = `📡 Расстояние до работы: ${Math.round(distance)} м`;
                
                let result;
                
                if (distance > ALLOWED_DISTANCE) {
                    result = {
                        status: "far",
                        message: `❌ Вы находитесь далеко от работы (${Math.round(distance)} м)`
                    };
                    statusDiv.className = 'status error';
                    statusDiv.textContent = result.message;
                } else {
                    // Проверка времени
                    const now = new Date();
                    const hours = now.getHours();
                    const minutes = now.getMinutes();
                    const currentMinutes = hours * 60 + minutes;
                    const workStartMinutes = 9 * 60; // 9:00
                    
                    const delayMinutes = currentMinutes - workStartMinutes;
                    
                    if (delayMinutes <= 0) {
                        result = {
                            status: "ontime",
                            message: `✅ Вы пришли вовремя! (${hours}:${minutes.toString().padStart(2,'0')})`
                        };
                    } else if (delayMinutes <= 30) {
                        result = {
                            status: "late_small",
                            message: `⚠️ Опоздание на ${delayMinutes} мин (${hours}:${minutes.toString().padStart(2,'0')})`
                        };
                    } else {
                        result = {
                            status: "late_big",
                            message: `🔴 Сильное опоздание на ${delayMinutes} мин (${hours}:${minutes.toString().padStart(2,'0')})`
                        };
                    }
                    
                    statusDiv.className = 'status success';
                    statusDiv.textContent = result.message;
                    
                    // Отправляем в Google Sheets
                    await sendToSheets(location, result);
                    
                    // Отправляем подтверждение в Telegram
                    await sendToBot(location);
                }
                
                // Показываем информацию о местоположении
                const locationInfo = document.getElementById('locationInfo');
                locationInfo.innerHTML = `
                    <strong>📍 Информация о местоположении:</strong><br>
                    Широта: ${location.latitude}<br>
                    Долгота: ${location.longitude}<br>
                    Точность: ${Math.round(location.accuracy)} м<br>
                    Расстояние до работы: ${Math.round(distance)} м
                `;
                locationInfo.style.display = 'block';
                
                // Через 3 секунды закрываем приложение
                setTimeout(() => {
                    tg.close();
                }, 3000);
                
            } catch (error) {
                console.error('Ошибка:', error);
                statusDiv.className = 'status error';
                statusDiv.textContent = `❌ ${error.message}`;
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }
        
        // Обработчики событий
        document.getElementById('checkinBtn').onclick = checkIn;
        document.getElementById('closeBtn').onclick = () => tg.close();
        
        // Отправляем данные о готовности
        console.log('Mini App готов к работе');
    </script>
</body>
</html>
