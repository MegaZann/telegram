<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Sushi Michurina - Фастфуд в посёлке</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
        }

        .app-wrapper {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        .desktop-layout {
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }

        .menu-section {
            flex: 1;
            min-width: 0;
        }

        .cart-sidebar {
            width: 360px;
            flex-shrink: 0;
            position: sticky;
            top: 20px;
            background: #0f0f0f;
            border-radius: 28px;
            border: 1px solid #2a2a2a;
            padding: 20px;
            height: fit-content;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #2a2a2a;
        }
        .logo {
            font-size: 2rem;
            font-weight: 800;
        }
        .logo span {
            color: #e33b3b;
        }
        .work-hours {
            font-size: 0.8rem;
            color: #25d366;
            margin-top: 6px;
        }
        .contacts {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .contacts a {
            color: #aaa;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .contacts a:hover {
            color: #e33b3b;
        }
        .delivery-info {
            font-size: 0.75rem;
            color: #888;
            margin-top: 8px;
        }

        .categories {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2a2a2a;
        }
        .category-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .category-btn.active {
            background: #e33b3b;
            border-color: #e33b3b;
            color: white;
        }
        .category-btn:hover {
            background: #e33b3b80;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .card {
            background: #141414;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
            transition: 0.2s;
            position: relative;
        }
        .card:hover {
            transform: translateY(-4px);
            border-color: #e33b3b;
            box-shadow: 0 8px 20px rgba(227,59,59,0.2);
        }
        .card-img {
            width: 100%;
            height: 170px;
            object-fit: cover;
            background: #1e1e1e;
        }
        .card-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: #e33b3b;
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 30px;
            z-index: 2;
        }
        .card-badge.new {
            background: #2a8e5c;
        }
        .card-badge.discount {
            background: #ff9800;
        }
        .card-content {
            padding: 14px;
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .card-desc {
            font-size: 0.75rem;
            color: #999;
            margin-bottom: 10px;
        }
        .price-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 12px;
        }
        .current-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: #e33b3b;
        }
        .old-price {
            font-size: 0.8rem;
            color: #777;
            text-decoration: line-through;
        }
        .add-to-cart-btn {
            background: #e33b3b;
            border: none;
            color: white;
            font-weight: bold;
            padding: 10px 0;
            width: 100%;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .add-to-cart-btn:hover {
            background: #c51f1f;
        }

        .cart-title {
            font-size: 1.3rem;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e33b3b;
            display: flex;
            justify-content: space-between;
        }
        .cart-items-list {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 16px;
        }
        .cart-item {
            display: flex;
            gap: 10px;
            background: #1a1a1a;
            border-radius: 16px;
            padding: 10px;
            margin-bottom: 10px;
        }
        .cart-item-img {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            object-fit: cover;
        }
        .cart-item-info {
            flex: 1;
        }
        .cart-item-name {
            font-size: 0.85rem;
            font-weight: bold;
        }
        .cart-item-price {
            font-size: 0.75rem;
            color: #e33b3b;
        }
        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #252525;
            padding: 4px 10px;
            border-radius: 30px;
        }
        .cart-item-controls button {
            background: none;
            border: none;
            color: #e33b3b;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            width: 24px;
        }
        .cart-item-qty {
            min-width: 20px;
            text-align: center;
        }
        .cart-item-total {
            font-size: 0.85rem;
            font-weight: bold;
            color: #e33b3b;
            min-width: 60px;
            text-align: right;
        }
        .cart-total {
            border-top: 1px solid #2a2a2a;
            padding-top: 12px;
            text-align: right;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 16px;
        }
        .cart-remove-btn {
            background: #2c2c2c;
            border: none;
            color: #ff7b7b;
            padding: 4px 8px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .checkout-btn {
            background: #25d366;
            border: none;
            color: black;
            font-weight: bold;
            padding: 12px;
            width: 100%;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1rem;
        }
        .empty-cart {
            text-align: center;
            padding: 30px 20px;
            color: #888;
        }

        .mobile-cart-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid #e33b3b;
            padding: 12px 20px;
            display: none;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
        }
        .mobile-cart-info {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }
        .mobile-cart-label {
            font-size: 0.9rem;
            color: #aaa;
        }
        .mobile-cart-total {
            font-size: 1.3rem;
            font-weight: bold;
            color: #e33b3b;
        }
        .mobile-cart-count {
            background: #e33b3b;
            color: white;
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .mobile-open-modal-btn {
            background: #25d366;
            border: none;
            color: black;
            font-weight: bold;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #121212;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            border-radius: 28px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #333;
        }
        .modal-header {
            padding: 18px 20px;
            background: #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a2a;
        }
        .modal-header h2 {
            font-size: 1.3rem;
            color: #e33b3b;
        }
        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
        }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        .modal-form input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 40px;
            color: white;
        }
        .form-row {
            display: flex;
            gap: 12px;
        }
        .form-row input {
            flex: 1;
        }
        .modal-submit {
            background: #25d366;
            border: none;
            color: black;
            font-weight: bold;
            padding: 14px;
            border-radius: 40px;
            width: 100%;
            margin-top: 16px;
            cursor: pointer;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #e33b3b;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 30px;
            padding: 16px;
            color: #555;
            border-top: 1px solid #2a2a2a;
        }

        @media (max-width: 768px) {
            .app-wrapper {
                padding: 12px;
                padding-bottom: 80px;
            }
            .desktop-layout {
                flex-direction: column;
            }
            .cart-sidebar {
                display: none;
            }
            .mobile-cart-bar {
                display: flex;
            }
        }

        @media (min-width: 769px) {
            .mobile-cart-bar {
                display: none;
            }
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="header">
        <div class="logo"><span>Sushi</span> Michurina</div>
        <div class="work-hours" id="workHours">⏰ Загрузка...</div>
        <div class="contacts" id="contactsBlock"></div>
        <div class="delivery-info" id="deliveryInfo"></div>
    </div>

    <div class="desktop-layout">
        <div class="menu-section">
            <div class="categories" id="categoriesContainer">
                <button class="category-btn active" data-category="all">🍱 Все</button>
            </div>
            <div id="menu-container" class="menu-grid"><div class="loading">🍣 Загрузка меню...</div></div>
        </div>

        <div class="cart-sidebar">
            <div class="cart-title">
                🛒 Корзина
                <span id="cartCount">0</span>
            </div>
            <div id="cart-items-sidebar" class="cart-items-list">
                <div class="empty-cart">Корзина пуста</div>
            </div>
            <div id="cart-total-sidebar" class="cart-total">Итого: 0 ₽</div>
            <button class="checkout-btn" id="openModalBtnDesktop">📲 Оформить заказ</button>
        </div>
    </div>

    <footer>Данные обновляются автоматически | ⚡ Доставка по посёлку</footer>
</div>

<div class="mobile-cart-bar" id="mobileCartBar">
    <div class="mobile-cart-info">
        <span class="mobile-cart-label">🛒 Ваша корзина:</span>
        <span class="mobile-cart-total" id="mobileBarTotal">0 ₽</span>
        <span class="mobile-cart-count" id="mobileBarCount">0</span>
    </div>
    <button class="mobile-open-modal-btn" id="openModalBtnMobile">Оформить →</button>
</div>

<div class="modal" id="orderModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>🛍️ Оформление заказа</h2>
            <button class="close-modal" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body">
            <div id="modalCartItems"></div>
            <div id="modalTotal" class="cart-total"></div>
            
            <div class="modal-form">
                <div class="form-row">
                    <input type="text" id="modalUserName" placeholder="Ваше имя">
                    <input type="tel" id="modalUserPhone" placeholder="Телефон">
                </div>
                <input type="text" id="modalUserAddress" placeholder="Адрес доставки">
                <button class="modal-submit" id="submitOrderBtn">📲 Отправить заказ в WhatsApp</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== НАСТРОЙКИ ==========
    const ORIGINAL_URL = "https://drive.google.com/uc?export=download&id=17snkkjMI0gBlxXTdtpONJKiUh_dHVld5";
    
    // ВАРИАНТ 1: corsproxy.io (более стабильный)
    const JSON_URL = "data.json";
    
    // ВАРИАНТ 2 (запасной, раскомментируйте если вариант 1 не работает):
    // const JSON_URL = "https://cors-anywhere.herokuapp.com/" + ORIGINAL_URL;
    
    let menuItems = [];
    let categories = new Set();
    let currentCategory = "all";
    let settings = {};
    let cart = [];
    
    function loadCart() {
        const saved = localStorage.getItem("sushi_cart");
        cart = saved ? JSON.parse(saved) : [];
        renderCart();
        updateMobileBar();
    }
    
    function saveCart() {
        localStorage.setItem("sushi_cart", JSON.stringify(cart));
        renderCart();
        updateMobileBar();
    }
    
    function loadUser() {
        const u = localStorage.getItem("sushi_user");
        if(u) {
            const d = JSON.parse(u);
            document.getElementById("modalUserName").value = d.name || "";
            document.getElementById("modalUserPhone").value = d.phone || "";
            document.getElementById("modalUserAddress").value = d.address || "";
        }
    }
    
    function saveUser() {
        const user = {
            name: document.getElementById("modalUserName").value,
            phone: document.getElementById("modalUserPhone").value,
            address: document.getElementById("modalUserAddress").value
        };
        localStorage.setItem("sushi_user", JSON.stringify(user));
    }
    
    function updateMobileBar() {
        const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        const count = cart.reduce((sum, item) => sum + item.quantity, 0);
        document.getElementById("mobileBarTotal").innerHTML = `${total} ₽`;
        document.getElementById("mobileBarCount").innerHTML = count;
    }
    
    function renderCategories() {
        const container = document.getElementById("categoriesContainer");
        const allCategories = ["all", ...Array.from(categories).sort()];
        container.innerHTML = allCategories.map(cat => `
            <button class="category-btn ${currentCategory === cat ? 'active' : ''}" data-category="${cat}">
                ${cat === "all" ? "🍱 Все" : cat}
            </button>
        `).join("");
        
        document.querySelectorAll(".category-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                currentCategory = btn.dataset.category;
                renderCategories();
                renderMenu();
            });
        });
    }
    
    function renderMenu() {
        const container = document.getElementById("menu-container");
        let filtered = currentCategory === "all" 
            ? menuItems 
            : menuItems.filter(item => item.category === currentCategory);
        
        if(!filtered.length) {
            container.innerHTML = '<div class="loading">Нет товаров в этой категории</div>';
            return;
        }
        
        container.innerHTML = "";
        filtered.forEach(item => {
            const finalPrice = Math.round(item.price * (1 - (item.discount || 0)/100));
            let badgeHtml = "";
            if(item.label === "popular") badgeHtml = '<div class="card-badge">🔥 Популярный</div>';
            else if(item.label === "new") badgeHtml = '<div class="card-badge new">✨ Новый</div>';
            else if(item.label === "discount" && item.discount > 0) badgeHtml = `<div class="card-badge discount">-${item.discount}%</div>`;
            
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <div style="position:relative;">
                    ${badgeHtml}
                    <img class="card-img" src="${item.photo_url || 'https://via.placeholder.com/300x170?text=🍣'}" alt="${escapeHtml(item.name)}" onerror="this.src='https://via.placeholder.com/300x170?text=Фото+нет'">
                </div>
                <div class="card-content">
                    <div class="card-title">${escapeHtml(item.name)}</div>
                    <div class="card-desc">${escapeHtml(item.description || '')}</div>
                    <div class="price-row">
                        <span class="current-price">${finalPrice} ₽</span>
                        ${item.discount ? `<span class="old-price">${item.price} ₽</span>` : ''}
                    </div>
                    <button class="add-to-cart-btn" data-id="${item.id}" data-name="${escapeHtml(item.name)}" data-price="${finalPrice}" data-img="${item.photo_url || ''}">➕ В корзину</button>
                </div>
            `;
            container.appendChild(card);
        });
        
        document.querySelectorAll(".add-to-cart-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                addToCart(btn.dataset.id, btn.dataset.name, parseInt(btn.dataset.price), btn.dataset.img);
            });
        });
    }
    
    function addToCart(id, name, price, img) {
        const existing = cart.find(i => i.id === id);
        if(existing) {
            existing.quantity++;
        } else {
            cart.push({ id, name, price, quantity: 1, img });
        }
        saveCart();
        
        const btn = event.target;
        btn.textContent = "✓ Добавлено";
        setTimeout(() => { btn.textContent = "➕ В корзину"; }, 800);
    }
    
    function renderCart() {
        const container = document.getElementById("cart-items-sidebar");
        const totalSpan = document.getElementById("cartCount");
        const totalSumSpan = document.getElementById("cart-total-sidebar");
        
        const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
        const count = cart.reduce((sum, item) => sum + item.quantity, 0);
        totalSpan.innerHTML = count;
        totalSumSpan.innerHTML = `Итого: ${total} ₽`;
        
        if(!cart.length) {
            container.innerHTML = '<div class="empty-cart">Корзина пуста<br>🍣 Добавьте товары</div>';
            return;
        }
        
        container.innerHTML = "";
        cart.forEach((item, idx) => {
            const itemTotal = item.price * item.quantity;
            const itemDiv = document.createElement("div");
            itemDiv.className = "cart-item";
            itemDiv.innerHTML = `
                <img class="cart-item-img" src="${item.img || 'https://via.placeholder.com/50x50?text=🍣'}" onerror="this.src='https://via.placeholder.com/50x50?text=🍣'">
                <div class="cart-item-info">
                    <div class="cart-item-name">${escapeHtml(item.name)}</div>
                    <div class="cart-item-price">${item.price} ₽</div>
                </div>
                <div class="cart-item-controls">
                    <button class="cart-qty-minus" data-idx="${idx}">−</button>
                    <span class="cart-item-qty">${item.quantity}</span>
                    <button class="cart-qty-plus" data-idx="${idx}">+</button>
                </div>
                <div class="cart-item-total">${itemTotal} ₽</div>
                <button class="cart-remove-btn" data-idx="${idx}">✕</button>
            `;
            container.appendChild(itemDiv);
        });
        
        document.querySelectorAll(".cart-qty-minus").forEach(btn => {
            btn.addEventListener("click", () => {
                const idx = parseInt(btn.dataset.idx);
                if(cart[idx].quantity > 1) cart[idx].quantity--;
                else cart.splice(idx,1);
                saveCart();
            });
        });
        document.querySelectorAll(".cart-qty-plus").forEach(btn => {
            btn.addEventListener("click", () => {
                const idx = parseInt(btn.dataset.idx);
                cart[idx].quantity++;
                saveCart();
            });
        });
        document.querySelectorAll(".cart-remove-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                const idx = parseInt(btn.dataset.idx);
                cart.splice(idx,1);
                saveCart();
            });
        });
    }
    
    function openModal() {
        renderModalCart();
        document.getElementById("orderModal").classList.add("active");
        loadUser();
    }
    
    function closeModal() {
        document.getElementById("orderModal").classList.remove("active");
    }
    
    function renderModalCart() {
        const container = document.getElementById("modalCartItems");
        if(!cart.length) {
            container.innerHTML = '<div class="empty-cart">Корзина пуста</div>';
            document.getElementById("modalTotal").innerHTML = "";
            return;
        }
        let html = "", total = 0;
        cart.forEach((item, idx) => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            html += `
                <div style="display:flex; justify-content:space-between; align-items:center; background:#1a1a1a; padding:12px; border-radius:16px; margin-bottom:8px;">
                    <div><strong>${escapeHtml(item.name)}</strong><br><small>${item.price}₽/шт</small></div>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <button class="modal-qty-minus" data-idx="${idx}">−</button>
                        <span>${item.quantity}</span>
                        <button class="modal-qty-plus" data-idx="${idx}">+</button>
                        <span style="min-width:60px; text-align:right;">${itemTotal}₽</span>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        document.getElementById("modalTotal").innerHTML = `💰 Итого: ${total} ₽`;
        
        document.querySelectorAll(".modal-qty-minus").forEach(btn => {
            btn.addEventListener("click", () => {
                const idx = parseInt(btn.dataset.idx);
                if(cart[idx].quantity > 1) cart[idx].quantity--;
                else cart.splice(idx,1);
                saveCart();
                renderModalCart();
            });
        });
        document.querySelectorAll(".modal-qty-plus").forEach(btn => {
            btn.addEventListener("click", () => {
                const idx = parseInt(btn.dataset.idx);
                cart[idx].quantity++;
                saveCart();
                renderModalCart();
            });
        });
    }
    
    async function submitOrder() {
        if(cart.length === 0) {
            alert("Корзина пуста!");
            return;
        }
        const name = document.getElementById("modalUserName").value.trim();
        const phone = document.getElementById("modalUserPhone").value.trim();
        const address = document.getElementById("modalUserAddress").value.trim();
        
        if(!name || !phone || !address) {
            alert("Заполните имя, телефон и адрес доставки!");
            return;
        }
        saveUser();
        
        let msg = `🍣 НОВЫЙ ЗАКАЗ Sushi Michurina%0A`;
        msg += `👤 Имя: ${name}%0A📞 Телефон: ${phone}%0A🏠 Адрес: ${address}%0A📋 Заказ:%0A`;
        let total = 0;
        cart.forEach(item => {
            const sum = item.price * item.quantity;
            total += sum;
            msg += `• ${item.name} x${item.quantity} = ${sum}₽%0A`;
        });
        msg += `💰 ИТОГО: ${total}₽`;
        
        const managerPhone = settings.phone ? settings.phone.replace(/\D/g, '') : "";
        const waUrl = managerPhone ? `https://wa.me/${managerPhone}?text=${msg}` : `https://wa.me/?text=${msg}`;
        window.open(waUrl, "_blank");
        
        cart = [];
        saveCart();
        closeModal();
        alert("✅ Заказ отправлен! Менеджер свяжется с вами.");
    }
    
    async function loadData() {
        try {
            console.log("🔄 Загрузка данных...");
            console.log("URL:", JSON_URL);
            
            // Добавляем таймаут 30 секунд
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 30000);
            
            const response = await fetch(JSON_URL, { signal: controller.signal });
            clearTimeout(timeoutId);
            
            if(!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            const data = await response.json();
            console.log("✅ Данные загружены:", data);
            
            menuItems = (data.menu || []).map(item => ({
                ...item,
                category: item.category || "Другое"
            }));
            
            categories.clear();
            menuItems.forEach(item => {
                if(item.category) categories.add(item.category);
            });
            
            settings = data.settings || {};
            
            console.log(`📦 Загружено товаров: ${menuItems.length}`);
            console.log("📂 Категории:", Array.from(categories));
            
            renderCategories();
            renderMenu();
            updateUI();
            
        } catch(err) {
            console.error("❌ Ошибка загрузки:", err);
            document.getElementById("menu-container").innerHTML = `<div class="loading">⚠️ Ошибка загрузки меню<br><small>${err.message}</small><br><br>🔄 Проверьте соединение или обновите страницу</div>`;
        }
    }
    
    function updateUI() {
        document.getElementById("workHours").innerHTML = `⏰ ${settings.work_hours || "12:00–23:00"}`;
        const contactsDiv = document.getElementById("contactsBlock");
        let html = "";
        if(settings.instagram) html += `<a href="${settings.instagram}" target="_blank">📷 Instagram</a>`;
        if(settings.telegram) html += `<a href="${settings.telegram}" target="_blank">💬 Telegram</a>`;
        if(settings.phone) html += `<a href="tel:${settings.phone}">📞 ${settings.phone}</a>`;
        contactsDiv.innerHTML = html;
        document.getElementById("deliveryInfo").innerHTML = `🚚 Мин. заказ: ${settings.delivery_min || 500}₽ | Бесплатно от ${settings.delivery_free || 1500}₽`;
    }
    
    function escapeHtml(str) {
        if(!str) return "";
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }
    
    document.addEventListener("DOMContentLoaded", () => {
        console.log("🚀 Сайт загружен");
        loadCart();
        loadData();
        
        document.getElementById("openModalBtnDesktop").addEventListener("click", openModal);
        document.getElementById("openModalBtnMobile").addEventListener("click", openModal);
        document.getElementById("closeModalBtn").addEventListener("click", closeModal);
        document.getElementById("submitOrderBtn").addEventListener("click", submitOrder);
        
        document.getElementById("orderModal").addEventListener("click", (e) => {
            if(e.target === document.getElementById("orderModal")) closeModal();
        });
        
        ["modalUserName", "modalUserPhone", "modalUserAddress"].forEach(id => {
            document.getElementById(id).addEventListener("input", saveUser);
        });
    });
</script>
